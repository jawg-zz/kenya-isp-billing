version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: isp_billing_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: isp_billing
      POSTGRES_USER: isp_billing
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-isp_billing_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U isp_billing"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: isp_billing_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
      args:
        BUILD_DATE: ${BUILD_DATE:-0}
    container_name: isp_billing_api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      API_PREFIX: /api/v1
      DATABASE_URL: postgresql://isp_billing:${POSTGRES_PASSWORD:-isp_billing_password}@postgres:5432/isp_billing?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-changeme_generate_real_secret}
      JWT_EXPIRES_IN: 7d
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-changeme_generate_real_secret}
      JWT_REFRESH_EXPIRES_IN: 30d
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost}
      MPESA_CONSUMER_KEY: ${MPESA_CONSUMER_KEY:-}
      MPESA_CONSUMER_SECRET: ${MPESA_CONSUMER_SECRET:-}
      MPESA_PASSKEY: ${MPESA_PASSKEY:-}
      MPESA_SHORTCODE: ${MPESA_SHORTCODE:-174379}
      MPESA_ENVIRONMENT: ${MPESA_ENVIRONMENT:-sandbox}
      MPESA_CALLBACK_URL: ${MPESA_CALLBACK_URL:-}
      MPESA_TIMEOUT_URL: ${MPESA_TIMEOUT_URL:-}
      AIRTEL_CLIENT_ID: ${AIRTEL_CLIENT_ID:-}
      AIRTEL_CLIENT_SECRET: ${AIRTEL_CLIENT_SECRET:-}
      AT_API_KEY: ${AT_API_KEY:-}
      AT_USERNAME: ${AT_USERNAME:-}
      RADIUS_SECRET: ${RADIUS_SECRET:-changeme_use_strong_secret}
      RADIUS_HOST: freeradius
      RADIUS_PORT: 1812
      RADIUS_ACCOUNTING_PORT: 1813
      DEFAULT_CURRENCY: KES
      TAX_RATE: "0.16"
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  freeradius:
    build:
      context: ./freeradius
      dockerfile: Dockerfile
    container_name: isp_billing_freeradius
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      RADIUS_SECRET: ${RADIUS_SECRET:-changeme_use_strong_secret}
      POSTGRES_USER: ${POSTGRES_USER:-isp_billing}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-isp_billing_password}
      POSTGRES_DB: ${POSTGRES_DB:-isp_billing}
      RADIUS_DB_HOST: postgres
      RADIUS_DB_PORT: 5432
    ports:
      - "1812:1812/udp"   # RADIUS Authentication
      - "1813:1813/udp"   # RADIUS Accounting
      - "3799:3799/udp"   # RADIUS CoA (Change of Authorization)
    healthcheck:
      test: ["CMD-SHELL", "radtest localhost testing123 127.0.0.1 0 testing 2>/dev/null || echo 'check'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - default

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    container_name: isp_billing_frontend
    restart: unless-stopped
    depends_on:
      - api
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
      NEXT_PUBLIC_APP_NAME: ISP Billing Portal
    expose:
      - "3000"

volumes:
  postgres_data:
  redis_data:
