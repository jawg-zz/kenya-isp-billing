<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GeorgeISP - Connected</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: #fff;
            border-radius: 20px;
            padding: 40px 30px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header .icon {
            font-size: 50px;
            margin-bottom: 10px;
        }
        .header h2 {
            color: #11998e;
        }
        .stat-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 15px;
            text-align: center;
        }
        .stat-card .value {
            font-size: 20px;
            font-weight: 700;
            color: #333;
        }
        .stat-card .label {
            font-size: 12px;
            color: #888;
            margin-top: 5px;
        }
        .btn-logout {
            display: block;
            width: 100%;
            padding: 14px;
            background: #ff4757;
            color: #fff;
            text-align: center;
            text-decoration: none;
            border-radius: 12px;
            font-weight: 600;
        }
        .btn-logout:hover { background: #e0303f; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="icon">✅</div>
            <h2>You're Connected!</h2>
        </div>

        <div class="stat-grid">
            <div class="stat-card">
                <div class="value">$TIME$</div>
                <div class="label">Time Connected</div>
            </div>
            <div class="stat-card">
                <div class="value">$BYTES_RECEIVED$</div>
                <div class="label">Downloaded</div>
            </div>
            <div class="stat-card">
                <div class="value">$BYTES_SENT$</div>
                <div class="label">Uploaded</div>
            </div>
            <div class="stat-card">
                <div class="value">$SESSION_TIME_LEFT$</div>
                <div class="label">Time Remaining</div>
            </div>
        </div>

        <a href="$PORTAL_ACTION$?logout=1" class="btn-logout">Disconnect</a>

        <div style="text-align:center; margin-top:20px; color:#aaa; font-size:12px;">
            &copy; 2026 GeorgeISP
        </div>
    </div>

    <script>
        // Auto-refresh every 30 seconds
        setTimeout(function(){ location.reload(); }, 30000);
    </script>
</body>
</html>
