# FreeRADIUS Clients Configuration
# NAS devices and local services allowed to send RADIUS requests

client localhost {
    ipaddr    = 127.0.0.1
    secret    = ${RADIUS_SECRET}
    require_message_authenticator = no
    nas_type  = other
}

client docker-network {
    # Allow all containers on the docker network
    ipaddr    = 172.16.0.0/12
    secret    = ${RADIUS_SECRET}
    require_message_authenticator = no
    nas_type  = other
}

# Add your NAS devices below:
# client mikrotik-ap {
#     ipaddr    = 192.168.1.1
#     secret    = your_nas_secret
#     nas_type  = mikrotik
# }

# MikroTik NAS - VPN tunnel endpoint (WireGuard peer 10.8.0.2)
client mikrotik-vpn {
    ipaddr      = 10.8.0.2
    secret      = ${RADIUS_SECRET}
    require_message_authenticator = yes
    nas_type    = mikrotik
    shortname   = mikrotik-primary
}

# WireGuard subnet - allow future NAS devices on the VPN mesh
client wireguard-subnet {
    ipaddr      = 10.8.0.0/24
    secret      = ${RADIUS_SECRET}
    require_message_authenticator = yes
    nas_type    = other
    shortname   = wireguard-mesh
}
