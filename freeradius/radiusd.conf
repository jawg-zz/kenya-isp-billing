# FreeRADIUS 3.x Configuration - ISP Billing System
# Ubuntu path: /etc/freeradius/3.0/

prefix = /usr
exec_prefix = /usr
sysconfdir = /etc
localstatedir = /var
logdir = /var/log/freeradius
raddbdir = /etc/freeradius/3.0
radacctdir = ${logdir}/radacct

name = radiusd
confdir = ${raddbdir}
modconfdir = ${confdir}/mods-config
certdir = ${confdir}/certs
cadir   = ${confdir}/certs
db_dir = ${raddbdir}
run_dir = ${localstatedir}/run/${name}
libdir = /usr/lib/freeradius

log {
    destination = files
    file = ${logdir}/radius.log
    syslog_facility = daemon
    stripped_names = no
    auth = yes
    auth_badpass = no
    auth_goodpass = no
}

security {
    max_attributes = 200
    reject_delay = 0
    status_server = yes
}

proxy_requests = no

$INCLUDE clients.conf

thread pool {
    start_servers = 5
    max_servers = 32
    min_spare_servers = 3
    max_spare_servers = 10
    max_requests_per_server = 0
}

modules {
    $INCLUDE mods-enabled/
}

instantiate {
}

authorize {
    preprocess
    chap
    mschap
    digest
    suffix
    sql
    expiration
    logintime
    pap
}

authenticate {
    Auth-Type PAP {
        pap
    }
    Auth-Type CHAP {
        chap
    }
    Auth-Type MS-CHAP {
        mschap
    }
}

preacct {
    preprocess
    acct_unique
    suffix
}

accounting {
    detail
    unix
    sql
    exec
}

session {
    radutmp
    sql
}

post-auth {
    sql
    remove_reply_message_if_eap
    Post-Auth-Type REJECT {
        attr_filter.access_reject
    }
}

pre-proxy {
}

post-proxy {
}
