// FreeRADIUS 3.x Minimal Configuration
// ISP Billing System - RADIUS Server

prefix = /usr
exec_prefix = /usr
sysconfdir = /etc
localstatedir = /var
sbindir = ${exec_prefix}/sbin
logdir = /var/log/radius
raddbdir = /etc/raddb
radacctdir = ${logdir}/radacct

name = radiusd
confdir = ${raddbdir}
modconfdir = ${confdir}/mods-config
certdir = ${confdir}/certs
cadir   = ${confdir}/certs
db_dir = ${raddbdir}

run_dir = ${localstatedir}/run/${name}

db_dir = ${raddbdir}

libdir = /usr/lib/freeradius

log {
    destination = files
    file = ${logdir}/radius.log
    syslog_facility = daemon
    stripped_names = no
    auth = yes
    auth_badpass = no
    auth_goodpass = no
    msg_denied = "You are already logged in - access denied"
}

security {
    max_attributes = 200
    reject_delay = 0
    status_server = yes
    allow_vulnerable_openssl = yes
}

proxy_requests = no

$INCLUDE clients.conf

thread pool {
    start_servers = 5
    max_servers = 32
    min_spare_servers = 3
    max_spare_servers = 10
    max_requests_per_server = 0
    auto_limit_acct = no
}

modules {
    $INCLUDE mods-enabled/
}

instantiate {
}

authorize {
    preprocess
    chap
    mschap
    digest
    suffix
    eap {
        ok = return
    }
    sql
    expiration
    logintime
    pap
}

authenticate {
    Auth-Type PAP {
        pap
    }
    Auth-Type CHAP {
        chap
    }
    Auth-Type MS-CHAP {
        mschap
    }
    Auth-Type digest {
        digest
    }
    Auth-Type eap {
        eap
    }
}

preacct {
    preprocess
    acct_unique
    suffix
}

accounting {
    detail
    unix
    sql
    exec
    attr_filter.accounting_response
}

session {
    radutmp
    sql
}

post-auth {
    update {
        &reply: += &session-state:
    }
    sql
    eap
    remove_reply_message_if_eap
    Post-Auth-Type REJECT {
        attr_filter.access_reject
        eap
        -User-Message
    }
}

pre-proxy {
}

post-proxy {
    eap
}
